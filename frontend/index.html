<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL SHORTENER</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold tracking-wider text-indigo-400 cursor-pointer" onclick="showLandingPage()">URL SHORTENER</span>
            <div id="nav-auth" class="flex gap-4">
                </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-10">
        
        <section id="landing-section" class="text-center py-16 space-y-6">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                Shorten Your Links.<br>Track Your Reach.
            </h1>
            <p class="text-lg text-slate-400 max-w-xl mx-auto">
                Bikin link panjangmu jadi ringkas, elegan, dan profesional. Pantau performa klik secara langsung lewat dashboard analitik terpadu.
            </p>
            <div class="flex justify-center gap-4 pt-4">
                <button onclick="showAuth(true)" class="bg-indigo-600 hover:bg-indigo-500 transition px-6 py-3 rounded-xl font-medium shadow-lg shadow-indigo-600/20">
                    Mulai Sekarang (Gratis)
                </button>
                <button onclick="showAuth(false)" class="border border-slate-700 hover:bg-slate-800 transition px-6 py-3 rounded-xl font-medium">
                    Masuk Akun
                </button>
            </div>
        </section>
        
        <section id="auth-section" class="max-w-md mx-auto bg-slate-800/50 border border-slate-700 p-8 rounded-2xl hidden shadow-xl my-10">
            <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center text-indigo-400">Login Akun</h2>
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-400">Email Address</label>
                    <input type="email" id="auth-email" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-400">Password</label>
                    <input type="password" id="auth-password" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 transition font-medium py-2.5 rounded-lg text-white shadow-lg shadow-indigo-600/20">Submit</button>
            </form>
            <p class="text-sm text-center text-slate-400 mt-4">
                <span id="auth-toggle-text">Belum punya akun?</span>
                <button id="auth-toggle-btn" class="text-indigo-400 hover:underline ml-1 font-medium">Register di sini</button>
            </p>
        </section>

        <section id="dashboard-section" class="space-y-8 hidden">
            <div class="bg-slate-800/40 border border-slate-800 p-6 rounded-2xl">
                <h3 class="text-lg font-semibold mb-4 text-indigo-400">Shorten a new URL</h3>
                <form id="shorten-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-2">
                        <input type="url" id="long-url" placeholder="Paste your long URL here (https://...)" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <input type="text" id="custom-alias" placeholder="Custom alias (optional)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                    </div>
                    <div class="md:col-span-3">
                        <button type="submit" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 transition px-6 py-3 rounded-xl font-medium shadow-lg shadow-indigo-600/20">Shorten URL</button>
                    </div>
                </form>
                <div id="shorten-result" class="mt-4 p-3 bg-emerald-950/30 border border-emerald-800 rounded-xl hidden text-emerald-400 text-sm flex justify-between items-center">
                    <span id="result-text"></span>
                    <button onclick="navigator.clipboard.writeText(document.getElementById('result-text').innerText)" class="bg-emerald-800/50 hover:bg-emerald-800 px-3 py-1 rounded-lg text-xs font-medium text-white transition">Copy</button>
                </div>
            </div>

            <div>
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span>Daftar Link Kamu</span>
                    <span id="links-count" class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-full">0</span>
                </h3>
                <div class="bg-slate-800/20 border border-slate-800 rounded-2xl overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-800 bg-slate-900/40 text-slate-400 text-sm">
                                <th class="p-4 font-medium">Short URL</th>
                                <th class="p-4 font-medium hidden md:table-cell">Original URL</th>
                                <th class="p-4 font-medium text-center">Clicks</th>
                            </tr>
                        </thead>
                        <tbody id="links-table-body" class="divide-y divide-slate-800 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <script>
        const API_URL = 'http://127.0.0.1:8000';
        let isLoginMode = true;
        let token = localStorage.getItem('token');

        // Elements
        const landingSection = document.getElementById('landing-section');
        const authSection = document.getElementById('auth-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const navAuth = document.getElementById('nav-auth');
        const authForm = document.getElementById('auth-form');
        const shortenForm = document.getElementById('shorten-form');

        // Init App state
        function init() {
            if (token) {
                landingSection.classList.add('hidden');
                authSection.classList.add('hidden');
                dashboardSection.removeProperty ? dashboardSection.removeProperty('display') : dashboardSection.classList.remove('hidden');
                navAuth.innerHTML = `<button onclick="logout()" class="text-sm text-rose-400 hover:underline font-medium">Logout</button>`;
                fetchMyLinks();
            } else {
                showLandingPage();
            }
        }

        function showLandingPage() {
            if (token) return;
            landingSection.classList.remove('hidden');
            authSection.classList.add('hidden');
            dashboardSection.classList.add('hidden');
            navAuth.innerHTML = `<button onclick="showAuth(false)" class="text-sm bg-indigo-600/10 text-indigo-400 border border-indigo-500/20 hover:bg-indigo-600/20 px-4 py-2 rounded-xl transition font-medium">Masuk</button>`;
        }

        function showAuth(registerMode = false) {
            landingSection.classList.add('hidden');
            dashboardSection.classList.add('hidden');
            authSection.classList.remove('hidden');
            
            isLoginMode = !registerMode;
            updateAuthUI();
            
            navAuth.innerHTML = `<button onclick="showLandingPage()" class="text-sm text-slate-400 hover:underline font-medium">Kembali</button>`;
        }

        function updateAuthUI() {
            document.getElementById('auth-title').innerText = isLoginMode ? 'Login Akun' : 'Daftar Akun';
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? 'Belum punya akun?' : 'Sudah punya akun?';
            document.getElementById('auth-toggle-btn').innerText = isLoginMode ? 'Register di sini' : 'Login di sini';
        }

        // Toggle Login / Register UI dari dalam form
        document.getElementById('auth-toggle-btn').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            updateAuthUI();
        });

        // Handle Auth Form Submit
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const endpoint = isLoginMode ? '/auth/login' : '/auth/register';

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'Terjadi kesalahan');

                if (isLoginMode) {
                    localStorage.setItem('token', data.access_token);
                    token = data.access_token;
                    authForm.reset();
                    init();
                } else {
                    alert(data.message);
                    isLoginMode = true;
                    updateAuthUI();
                }
            } catch (err) {
                alert(err.message);
            }
        });

        // Handle Shorten Form Submit
        shortenForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const long_url = document.getElementById('long-url').value;
            const custom_alias = document.getElementById('custom-alias').value || null;

            try {
                const res = await fetch(`${API_URL}/shorten?token=${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ long_url, custom_alias })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'Gagal memendekkan URL');

                const resultDiv = document.getElementById('shorten-result');
                const resultText = document.getElementById('result-text');
                const fullShortUrl = `${API_URL}/${data.short_code}`;
                
                resultText.innerText = fullShortUrl;
                resultDiv.classList.remove('hidden');
                shortenForm.reset();
                fetchMyLinks();
            } catch (err) {
                alert(err.message);
            }
        });

        // Fetch user links
        async function fetchMyLinks() {
            try {
                const res = await fetch(`${API_URL}/my-links?token=${token}`);
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);

                document.getElementById('links-count').innerText = data.total_links;
                const tbody = document.getElementById('links-table-body');
                tbody.innerHTML = '';

                if(data.links.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-slate-500">Belum ada link yang dibuat.</td></tr>`;
                    return;
                }

                data.links.forEach(link => {
                    const fullShortUrl = `${API_URL}/${link.short_code}`;
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-800/30 transition">
                            <td class="p-4 font-medium text-indigo-400">
                                <a href="${fullShortUrl}" target="_blank" class="hover:underline">${fullShortUrl}</a>
                            </td>
                            <td class="p-4 text-slate-400 truncate max-w-xs hidden md:table-cell">${link.long_url}</td>
                            <td class="p-4 text-center font-semibold text-slate-300">${link.clicks}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
                logout();
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            init();
        }

        // Run on load
        init();
    </script>
</body>
</html>
